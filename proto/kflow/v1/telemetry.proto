syntax = "proto3";

package kflow.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/pastorenue/kflow/internal/gen/kflow/v1;kflowv1";

service TelemetryService {
  rpc ListExecutionEvents(ListExecutionEventsRequest) returns (ListExecutionEventsResponse) {
    option (google.api.http) = {
      get: "/api/v1/executions/{execution_id}/events"
    };
  }
  rpc ListServiceMetrics(ListServiceMetricsRequest) returns (ListServiceMetricsResponse) {
    option (google.api.http) = {
      get: "/api/v1/services/{service_name}/metrics"
    };
  }
  rpc ListLogs(ListLogsRequest) returns (ListLogsResponse) {
    option (google.api.http) = {
      get: "/api/v1/logs"
    };
  }
}

message EventRow {
  string event_id = 1;
  string execution_id = 2;
  string state_name = 3;
  string from_status = 4;
  string to_status = 5;
  string error = 6;
  google.protobuf.Timestamp occurred_at = 7;
}

message MetricRow {
  string metric_id = 1;
  string service_name = 2;
  string invocation_id = 3;
  uint64 duration_ms = 4;
  uint32 status_code = 5;
  string error = 6;
  google.protobuf.Timestamp occurred_at = 7;
}

message LogRow {
  string log_id = 1;
  string execution_id = 2;
  string service_name = 3;
  string state_name = 4;
  string level = 5;
  string message = 6;
  google.protobuf.Timestamp occurred_at = 7;
}

message ListExecutionEventsRequest {
  string execution_id = 1;
  google.protobuf.Timestamp since = 2;
  int32 limit = 3;
}

message ListExecutionEventsResponse {
  repeated EventRow events = 1;
}

message ListServiceMetricsRequest {
  string service_name = 1;
  google.protobuf.Timestamp since = 2;
  google.protobuf.Timestamp until = 3;
  int32 limit = 4;
}

message ListServiceMetricsResponse {
  repeated MetricRow metrics = 1;
}

message ListLogsRequest {
  string execution_id = 1;
  string service_name = 2;
  string state_name = 3;
  string level = 4;
  google.protobuf.Timestamp since = 5;
  google.protobuf.Timestamp until = 6;
  string query = 7;
  int32 limit = 8;
  int32 offset = 9;
}

message ListLogsResponse {
  repeated LogRow logs = 1;
  int32 total = 2;
}
