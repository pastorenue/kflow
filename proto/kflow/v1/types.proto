syntax = "proto3";

package kflow.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/pastorenue/kflow/internal/gen/kflow/v1;kflowv1";

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_PENDING = 1;
  STATUS_RUNNING = 2;
  STATUS_COMPLETED = 3;
  STATUS_FAILED = 4;
}

enum ServiceStatus {
  SERVICE_STATUS_UNSPECIFIED = 0;
  SERVICE_STATUS_PENDING = 1;
  SERVICE_STATUS_RUNNING = 2;
  SERVICE_STATUS_FAILED = 3;
  SERVICE_STATUS_STOPPED = 4;
}

message RetryPolicy {
  int32 max_attempts = 1;
  double backoff_seconds = 2;
}

message ExecutionRecord {
  string id = 1;
  string workflow = 2;
  Status status = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message StateRecord {
  string execution_id = 1;
  string state_name = 2;
  Status status = 3;
  string error = 4;
  int32 attempt = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message ServiceRecord {
  string name = 1;
  string mode = 2;
  int32 port = 3;
  int32 min_scale = 4;
  int32 max_scale = 5;
  string ingress_host = 6;
  string cluster_ip = 7;
  ServiceStatus status = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message StateTransitionEvent {
  string execution_id = 1;
  string state_name = 2;
  string from_status = 3;
  string to_status = 4;
  string error = 5;
  google.protobuf.Timestamp occurred_at = 6;
}

message ServiceUpdateEvent {
  string service_name = 1;
  string status = 2;
  google.protobuf.Timestamp occurred_at = 3;
}
