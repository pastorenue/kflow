version: v2
plugins:
  - local: protoc-gen-go
    out: ../internal/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../internal/gen
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  - local: protoc-gen-grpc-gateway
    out: ../internal/gen
    opt:
      - paths=source_relative
